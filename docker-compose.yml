services:
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: mineflow-postgres
    environment:
      POSTGRES_USER: mineflow
      POSTGRES_PASSWORD: mineflow
      POSTGRES_DB: mineflow
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mineflow -d mineflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  analytics-service:
    build: ./analytics-service
    container_name: mineflow-analytics
    ports:
      - "8000:8000"

  server:
    build: ./server
    container_name: mineflow-server
    environment:
      PORT: 5000
      DATABASE_URL: postgres://mineflow:mineflow@postgres:5432/mineflow
      ANALYTICS_SERVICE_URL: http://analytics-service:8000
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      analytics-service:
        condition: service_started

  client:
    build: ./client
    container_name: mineflow-client
    environment:
      VITE_API_BASE_URL: http://localhost:5001
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  postgres-data:
